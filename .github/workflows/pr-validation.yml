name: PR Validation

on:
  pull_request:
    branches: [main]
    paths:
      - '**.hcl'
      - '**.tf'
      - 'modules/**'
      - 'units/**'
      - 'live/**'

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Validate Modules
        run: |
          for module in modules/*/; do
            echo "==> Validating $module"
            cd "$module"
            terraform init -backend=false
            terraform validate
            cd - > /dev/null
          done

      - name: TFLint
        run: |
          tflint --init
          for module in modules/*/; do
            echo "==> Linting $module"
            tflint --chdir="$module" --config="$(pwd)/.tflint.hcl"
          done

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Checkov scan
        run: checkov -d modules/ --framework terraform --soft-fail

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  plan:
    name: Plan (changed only)
    runs-on: ubuntu-latest
    needs: [validate, security]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Find affected units
        id: affected
        run: |
          cd live
          terragrunt stack generate
          AFFECTED=$(terragrunt find --filter-affected 2>&1 || true)
          echo "affected=$AFFECTED" >> $GITHUB_OUTPUT
          if [ -z "$AFFECTED" ]; then
            echo "No units affected by this PR"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Affected units:"
            echo "$AFFECTED"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Terragrunt Plan (affected units)
        if: steps.affected.outputs.has_changes == 'true'
        id: plan
        run: |
          set -euo pipefail
          cd live
          echo "## Stack Plan (affected units only)" > plan_output.txt
          echo "" >> plan_output.txt
          terragrunt run --all --filter-affected -- plan -lock=false 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee -a plan_output.txt

      - name: Upload Plan Output
        if: steps.affected.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: plan-output
          path: live/plan_output.txt

  comment:
    name: Comment PR
    runs-on: ubuntu-latest
    needs: [plan]
    if: always() && needs.plan.result == 'success'
    steps:
      - name: Download Plan Output
        uses: actions/download-artifact@v4
        with:
          name: plan-output
          path: plans
        continue-on-error: true

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planFile = 'plans/plan_output.txt';
            if (!fs.existsSync(planFile)) {
              const body = `## Terragrunt Plan\n\nNo units affected by this PR — nothing to plan.`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
              return;
            }

            const content = fs.readFileSync(planFile, 'utf8');
            const status = '${{ needs.plan.result }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const truncated = content.length > 60000
              ? content.substring(0, 60000) + '\n\n... truncated ...'
              : content;

            const body = `## ${emoji} Terragrunt Plan (affected units only)\n\n**Status:** ${status}\n\n<details>\n<summary>Plan output</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n</details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
