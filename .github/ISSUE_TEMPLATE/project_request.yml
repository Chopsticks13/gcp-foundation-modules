name: New GCP Project Request
description: Request a new GCP project to be created
title: "[PROJECT]: "
labels: ["project-request", "triage"]
assignees:
  - Chopsticks13

body:
  - type: markdown
    attributes:
      value: |
        ## New GCP Project Request

        Use this template to request a new GCP project. The platform team will review and provision it.

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Which environment should this project be created in?
      options:
        - dev
        - staging
        - prod
    validations:
      required: true

  - type: input
    id: project-id
    attributes:
      label: Proposed Project ID
      description: "Must follow naming convention: ops-{env}-{purpose}-7x2"
      placeholder: "e.g., ops-dev-data-7x2"
    validations:
      required: true

  - type: input
    id: project-name
    attributes:
      label: Project Name
      description: Human-readable project name
      placeholder: "e.g., Ops Dev Data"
    validations:
      required: true

  - type: input
    id: team
    attributes:
      label: Team/Owner
      description: Which team owns this project?
      placeholder: "e.g., platform, data, backend"
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: Purpose/Description
      description: What is this project for?
      placeholder: Describe the purpose and use case for this project
    validations:
      required: true

  - type: textarea
    id: services
    attributes:
      label: GCP APIs to enable
      description: List the APIs this project needs
      placeholder: |
        - compute.googleapis.com
        - container.googleapis.com
        - storage.googleapis.com
      value: |
        - cloudresourcemanager.googleapis.com
        - iam.googleapis.com
        - logging.googleapis.com
        - monitoring.googleapis.com
        - serviceusage.googleapis.com
        - storage.googleapis.com
    validations:
      required: true

  - type: textarea
    id: iam-bindings
    attributes:
      label: IAM Bindings
      description: Any specific IAM bindings required?
      placeholder: |
        - roles/viewer: ["user:someone@example.com"]
        - roles/editor: ["group:team@example.com"]
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other requirements or context
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have verified the project ID follows naming conventions (see docs/NAMING.md)
          required: true
        - label: I have identified the team/owner responsible for this project
          required: true
